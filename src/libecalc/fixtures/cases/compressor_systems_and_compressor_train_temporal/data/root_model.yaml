                  - SIM1;GAS_PROD {/} 2
                SUCTION_PRESSURES:
                  - 20
                  - 30
                  - 40
                DISCHARGE_PRESSURES:
                  - 220
                  - 230
                  - 240
              - RATES:
                - SIM1;GAS_PROD {/} 3
                - SIM1;GAS_PROD {/} 3
                - SIM1;GAS_PROD {/} 3
                SUCTION_PRESSURES:
                  - 50
                  - 60
                  - 70
                DISCHARGE_PRESSURES:
                  - 250
                  - 260
                  - 270
          2019-01-01:
            TYPE: COMPRESSOR_SYSTEM
            COMPRESSORS:
              - NAME: train1_upgraded
                COMPRESSOR_MODEL: variable_speed_compressor_train_predefined_variable_speed_chart_user_defined_fluid_composition_with_turbine
              - NAME: train2_upgraded
                COMPRESSOR_MODEL: variable_speed_compressor_train_predefined_variable_speed_chart_user_defined_fluid_composition_with_turbine
            OPERATIONAL_SETTINGS:
              - RATES:
                  - SIM1;GAS_PROD {/} 2
                  - SIM1;GAS_PROD {/} 2
                SUCTION_PRESSURES:
                  - 40
                  - 45
                DISCHARGE_PRESSURES:
                  - 240
                  - 245
              