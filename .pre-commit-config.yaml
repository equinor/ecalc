auto_update:
  cooldown_days: 3

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c  # frozen: v6.0.0
    hooks:
      - id: no-commit-to-branch  # Do not allow commits to master/main branch
      - id: debug-statements  # Looks for debugger imports and `breakpoint()`
      - id: mixed-line-ending  # Replaces mixed line ending to the most common
        exclude: |
          (?x)^(
              \.ts|
              \.tsx
          )
      - id: detect-private-key  # Checks for private keys
      - id: check-merge-conflict  # Check for merge conflict strings
  - repo: https://github.com/charliermarsh/ruff-pre-commit
    rev: '6fec9b7edb08fd9989088709d864a7826dc74e80'  # frozen: v0.15.12
    hooks:
      - id: ruff
        files: ^(src/.*\.py|tests/.*\.py)$
        exclude: gen/|\.git|\.hg|\.mypy_cache|\.tox|\.venv|_build|buck-out|build|dist
        args:
          - --fix
      #          - --unsafe-fixes # Enable this to allow potentially unsafe fixes, such as those that may change code behavior. Use with caution.
      - id: ruff-format

  - repo: https://github.com/codespell-project/codespell
    rev: '2ccb47ff45ad361a21071a7eedda4c37e6ae8c5a' # frozen: v2.4.2
    hooks:
      - id: codespell
        name: Check for typos in code
        additional_dependencies: [ tomli ]
        exclude: docs/docs/changelog/changelog.md|.*\.ipynb
  - repo: https://github.com/alessandrojcm/commitlint-pre-commit-hook
    rev: 1d7031e6d0bbfce76e5a625b0cec24fb22e517a0  # frozen: v9.25.0

    hooks:
      - id: commitlint
        stages: [ commit-msg ]
        additional_dependencies: [ '@commitlint/config-conventional' ]

  - repo: https://github.com/trufflesecurity/trufflehog
    rev: 17456f8c7d042d8c82c9a8ca9e937231f9f42e26  # frozen: v3.95.2
    hooks:
      - id: trufflehog
        stages: [ "pre-commit" ]
        entry: trufflehog git file://. --since-commit HEAD --fail -x .trufflehogignore

  - repo: https://github.com/asottile/pyupgrade
    rev: 75992aaa40730136014f34227e0135f63fc951b4  # frozen: v3.21.2
    hooks:
      - id: pyupgrade
        args: [ "--py312-plus" ]
